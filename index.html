<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The World Simpler</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      color: #000000;
      font-family: 'Inter Display', sans-serif;
    }

    body {
      padding: 40px;
      line-height: 1.4;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      margin: 0;
    }
  </style>
</head>
<body>
  <h1>The World Simpler</h1>
</body>
</html>
